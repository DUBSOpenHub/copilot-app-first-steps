<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="520" viewBox="0 0 1280 520" role="img" aria-labelledby="title desc">
  <title id="title">Copilot App First Steps hero</title>
  <desc id="desc">A GitHub-aligned hero graphic for Copilot App First Steps showing a natural-language Copilot conversation that turns project notes into a useful team update.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0D1117"/>
      <stop offset="0.62" stop-color="#010409"/>
      <stop offset="1" stop-color="#161B22"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#1F6FEB"/>
      <stop offset="1" stop-color="#8957E5"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="24" stdDeviation="28" flood-color="#010409" flood-opacity="0.45"/>
    </filter>
  </defs>

  <rect width="1280" height="520" rx="36" fill="url(#bg)"/>
  <circle cx="1050" cy="80" r="220" fill="#2F81F7" opacity="0.22"/>
  <circle cx="1180" cy="420" r="180" fill="#A371F7" opacity="0.18"/>
  <circle cx="140" cy="440" r="190" fill="#3FB950" opacity="0.08"/>

  <g transform="translate(70 74)">
    <rect width="550" height="372" rx="28" fill="#0d1117" stroke="#30363d" filter="url(#shadow)"/>
    <rect x="0" y="0" width="550" height="58" rx="28" fill="#161B22"/>
    <circle cx="34" cy="29" r="7" fill="#f85149"/>
    <circle cx="58" cy="29" r="7" fill="#d29922"/>
    <circle cx="82" cy="29" r="7" fill="#3fb950"/>

    <rect x="26" y="84" width="142" height="248" rx="18" fill="#161B22" stroke="#30363D"/>
    <text x="46" y="120" font-family="Arial, sans-serif" font-size="16" font-weight="700" fill="#E6EDF3">Projects</text>
    <rect x="46" y="146" width="92" height="12" rx="6" fill="#8B949E" opacity="0.55"/>
    <rect x="46" y="174" width="108" height="12" rx="6" fill="#8B949E" opacity="0.35"/>
    <rect x="46" y="202" width="76" height="12" rx="6" fill="#8B949E" opacity="0.35"/>
    <rect x="46" y="252" width="100" height="38" rx="12" fill="#1F6FEB" opacity="0.82"/>
    <text x="60" y="277" font-family="Arial, sans-serif" font-size="13" fill="#E6EDF3">Create</text>

    <rect x="194" y="84" width="330" height="248" rx="18" fill="#161B22" stroke="#30363D"/>
    <rect x="222" y="112" width="238" height="44" rx="17" fill="#8957E5"/>
    <text x="242" y="140" font-family="Arial, sans-serif" font-size="15" fill="#E6EDF3">Turn my notes into a team update</text>
    <rect x="222" y="178" width="250" height="50" rx="16" fill="#0D1117" stroke="#30363D"/>
    <text x="242" y="209" font-family="Arial, sans-serif" font-size="15" fill="#E6EDF3">Summary + next steps</text>
    <rect x="222" y="246" width="272" height="50" rx="16" fill="#0D1117" stroke="#30363D"/>
    <text x="242" y="277" font-family="Arial, sans-serif" font-size="15" fill="#E6EDF3">Ready-to-send draft</text>

    <rect x="194" y="348" width="330" height="42" rx="18" fill="#010409" stroke="#2F81F7"/>
    <text x="218" y="375" font-family="Arial, sans-serif" font-size="15" fill="#8B949E">Type: start app tutorial</text>
  </g>

  <g transform="translate(690 104)">
    <rect x="0" y="0" width="230" height="34" rx="17" fill="#2F81F7" opacity="0.18"/>
    <text x="22" y="23" font-family="Arial, sans-serif" font-size="15" font-weight="700" fill="#58A6FF">5 minutes to your first win</text>

    <text x="0" y="94" font-family="Arial, sans-serif" font-size="56" font-weight="800" fill="#E6EDF3">Build the thing</text>
    <text x="0" y="158" font-family="Arial, sans-serif" font-size="56" font-weight="800" fill="#E6EDF3">you have been</text>
    <text x="0" y="222" font-family="Arial, sans-serif" font-size="56" font-weight="800" fill="#E6EDF3">waiting for.</text>
    <text x="0" y="276" font-family="Arial, sans-serif" font-size="23" fill="#8B949E">No code editor. No terminal. Just ask.</text>

    <rect x="0" y="292" width="315" height="62" rx="18" fill="url(#accent)"/>
    <text x="28" y="332" font-family="Arial, sans-serif" font-size="21" font-weight="800" fill="#ffffff">Open the app and build</text>

    <rect x="0" y="382" width="420" height="1" fill="#30363d"/>
    <text x="0" y="420" font-family="Arial, sans-serif" font-size="17" fill="#8B949E">Everyone can become a developer.</text>
  </g>
</svg>
